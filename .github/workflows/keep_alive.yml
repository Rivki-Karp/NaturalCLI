name: Keep Hugging Face Space Alive

on:
  schedule:
    # ירוץ כל 24 שעות
    - cron: '0 0 * * *'
  workflow_dispatch: # מאפשר לך להריץ ידנית לבדיקה

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Space
        run: |
          # החליפי את ה-URL למטה בכתובת ה-Space האמיתית שלך
          curl -I https://huggingface.co/spaces/Rivki-Karp/NaturalCLI
